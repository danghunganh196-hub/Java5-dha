<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>login</title>
</head>
<body>
<form th:action="@{auth/login-form}" method="post">
  <h1>Đăng nhập</h1>
<div>
  <label for="username">Tên đăng nhập:</label>
  <input type="text" id="username" name="username">
</div>
  <div>
    <label for="password">Mật khẩu:</label>
    <input type="text" id="password" name="password">
  </div>
<button>login</button>
</form>
</body>
</html>
