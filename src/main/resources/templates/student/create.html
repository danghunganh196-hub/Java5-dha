<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student</title>
</head>
<body>
<div class="container py-3">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h4>Quản lý sinh viên</h4><br>
            <h3 class="text-center mb-3" th:text="${message}"></h3>
        <form th:action="@{/student/create}" method="post" th:object="${student}">
            <div class="mb-3">
                <label for="id" class="form-label">Mã sinh viên</label>
                <input th:field="*{id}" id="id" class="form-control"/>
                <div class="text-danger" th:if="${#fields.hasErrors('id')}" th:errors="*{id}"></div>
            </div>
            <div class="mb-3">
                <label for="name" class="form-label">Tên sinh viên</label>
                <input th:field="*{name}" id="name" class="form-control"/>
            </div>
            <div class="mb-3">
                <label class="form-label d-block">Giới tính</label>
                <div class="form-check form-check-inline">
                    <input th:field="*{gender}" id="male" class="form-check-input" type="radio" value="true"/>
                    <label class="form-check-label" for="male">Nam</label>
                </div>
                <div class="form-check form-check-inline">
                    <input th:field="*{gender}" id="female" class="form-check-input" type="radio" value="false"/>
                    <label class="form-check-label" for="female">Nữ</label>
                </div>
            </div>
            <div class="mb-3">
                <label for="birthday" class="form-label">Ngày sinh</label>
                <input th:field="*{birthday}" type="date" id="birthday" class="form-control">
            </div>
            <div class="mb-3">
                <label for="image" class="form-label">Image</label>
                <input th:field="*{image}" type="text" id="image" class="form-control">
            </div>
            <div class="mb-3">
                <label for="score" class="form-label">Điểm trung bình</label>
                <input th:field="*{score}" type="text" id="score" class="form-control">
            </div>
            <button type="submit" class="btn btn-primary">Ghi dữ liệu</button>
        </form>
        </div>
    </div>
</div>
</body>
</html>
